
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L057 – Maker & Design</title>

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#000000">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    text-align: center;

    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

header {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.logo {
    width: min(520px, 80vw);
    height: auto;
    display: block;
    margin: 0 auto 18px auto;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.6));
    position: relative;
    z-index: 1;

    opacity: 0;
    animation: logoFade 0.6s ease forwards;
}
    

@keyframes logoFade {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    
.logo-wrap {
    position: relative;
    display: inline-block;
}

.logo-wrap::before {
    content: "";
    position: absolute;
    inset: -15%;
    background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 65%);
    filter: blur(14px);
    z-index: 0;
}
    
.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}
    
h1 {
    font-size: 3rem;
    letter-spacing: 5px;
}

header p {
    color: #777;
    letter-spacing: 2px;
    font-size: 0.9rem;
    margin-top: 10px;
}
    
body a {
    color: #ffffff;
}

.button {
    margin-top: 40px;
    padding: 12px 32px;
    border: 1px solid #555;
    text-decoration: none;
    color: #e0e0e0;
    display: inline-block;
    letter-spacing: 1px;
    transition: all 0.25s ease;
}

.button:hover {
    background: #ffffff;
    color: #000000;
    border-color: #ffffff;
    transform: translateY(-2px);
}

footer {
    margin-top: 100px;
    font-size: 0.9rem;
    color: #888;
}

footer a {
    color: #888;
    text-decoration: none;
}

footer a:hover {
    color: #ffffff;
}
</style>
</head>

<body>

<header>
    <h1 class="sr-only">L057</h1>

    <div class="logo-wrap">
    <img src="logo.png" alt="L057 Logo" class="logo">
</div>

    <p>Design · Engineering · 3D Printing</p>
    <a href="mailto:l057.design@gmail.com" class="button">Kontakt</a>
</header>

<footer>
    <p>© 2026 L057</p>
    <p>
        <a href="index.html">Startseite</a> |
        <a href="impressum.html">Impressum</a> |
        <a href="datenschutz.html">Datenschutz</a>
    </p>
</footer>

</body>
</html>

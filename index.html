<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L057 – Design · Engineering · 3D Printing</title>
<meta name="description" content="L057 ist eine minimalistische Maker- und Engineering-Marke für Design, Konstruktion und 3D-Druck.">
<meta name="theme-color" content="#0d0d0d">

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
<link rel="manifest" href="/site.webmanifest">

<style>
:root {
    --bg: #0d0d0d;
    --panel: #121212;
    --text: #e8e8e8;
    --muted: #8d8d8d;
    --line: #2a2a2a;
    --line-strong: #4a4a4a;
    --max-width: 1120px;
    --content-width: 720px;
    --radius: 14px;
    --transition: 180ms ease;
}

*,
*::before,
*::after {
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;

    display: flex;
    flex-direction: column;
}

img {
    max-width: 100%;
    display: block;
}

a {
    color: inherit;
}

.page {
    width: min(calc(100% - 32px), var(--max-width));
    margin: 0 auto;
}

.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

.hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 0;
}

.hero-inner {
    width: min(100%, var(--content-width));
    text-align: center;
}

.logo-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 24px;
}

.logo-wrap::before {
    content: "";
    position: absolute;
    inset: -18%;
    background: radial-gradient(circle, rgba(255,255,255,0.022) 0%, rgba(255,255,255,0) 68%);
    filter: blur(12px);
    pointer-events: none;
}

.logo {
    width: min(520px, 78vw);
    height: auto;
    filter: drop-shadow(0 12px 30px rgba(0,0,0,0.45));
    position: relative;
    z-index: 1;
    opacity: 0;
    animation: logoFade 600ms ease forwards;
}

@keyframes logoFade {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.claim {
    margin: 0;
    color: var(--muted);
    font-size: 0.92rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
}

.intro {
    margin: 18px auto 0;
    max-width: 38rem;
    color: #b7b7b7;
    font-size: 0.98rem;
    line-height: 1.7;
}

.button-group {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 36px;
}

.button {
    min-width: 150px;
    padding: 13px 22px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    text-decoration: none;
    color: var(--text);
    background: transparent;
    letter-spacing: 0.08em;
    font-size: 0.84rem;
    text-transform: uppercase;
    transition:
        background var(--transition),
        color var(--transition),
        border-color var(--transition),
        transform var(--transition);
}

.button:hover,
.button:focus-visible {
    background: #f2f2f2;
    color: #0d0d0d;
    border-color: #f2f2f2;
    transform: translateY(-1px);
    outline: none;
}

.button-secondary {
    border-color: var(--line);
    color: #cfcfcf;
}

footer {
    border-top: 1px solid var(--line);
    padding: 22px 0 28px;
}

.footer-inner {
    width: min(calc(100% - 32px), var(--max-width));
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: 0.88rem;
}

.footer-nav {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
}

.footer-nav a {
    color: var(--muted);
    text-decoration: none;
    transition: color var(--transition);
}

.footer-nav a:hover,
.footer-nav a:focus-visible {
    color: var(--text);
    outline: none;
}

@media (max-width: 640px) {
    .hero {
        padding: 32px 0;
    }

    .claim {
        font-size: 0.82rem;
        letter-spacing: 0.18em;
    }

    .intro {
        font-size: 0.95rem;
    }

    .footer-inner {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
}

@media (prefers-reduced-motion: reduce) {
    html {
        scroll-behavior: auto;
    }

    .logo {
        animation: none;
        opacity: 1;
        transform: none;
    }

    .button {
        transition: none;
    }
}
</style>
</head>
<body>

<main class="hero page">
    <section class="hero-inner" aria-labelledby="site-title">
        <h1 id="site-title" class="sr-only">L057</h1>

        <div class="logo-wrap">
            <img src="logo.png" alt="L057 Logo" class="logo" width="520" height="220">
        </div>

        <p class="claim">Design · Engineering · 3D Printing</p>
        <p class="intro">
            Minimalistische Lösungen an der Schnittstelle von Gestaltung, Konstruktion und digitaler Fertigung.
        </p>

        <nav class="button-group" aria-label="Hauptnavigation">
            <a href="projekte.html" class="button">Projekte</a>
            <a href="mailto:l057.design@gmail.com" class="button button-secondary">Kontakt</a>
        </nav>
    </section>
</main>

<footer>
    <div class="footer-inner">
        <div>© 2026 L057</div>
        <nav class="footer-nav" aria-label="Footer Navigation">
            <a href="impressum.html">Impressum</a>
            <a href="datenschutz.html">Datenschutz</a>
        </nav>
    </div>
</footer>

</body>
</html>
